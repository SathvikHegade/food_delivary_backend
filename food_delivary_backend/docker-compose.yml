services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: food_user
      POSTGRES_PASSWORD: CHANGE_ME_STRONG_PASSWORD
      POSTGRES_DB: food_delivery_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://food_user:CHANGE_ME_STRONG_PASSWORD@db:5432/food_delivery_db
    depends_on:
      - db

volumes:
  postgres_data: